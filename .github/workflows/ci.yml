name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - run: cargo build --locked --release -p graffito-editor

  core-linux:
    name: Core crates (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p sms-formats -p sms-schema -p sms-scene
      - run: cargo check --locked -p graffito-editor -p sms-cli

  audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      # The action installs without --locked, which currently resolves a
      # Rust-1.96-only transitive dependency despite cargo-audit's 1.88 MSRV.
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # quick-xml is only used by wayland-scanner at build time on trusted
          # protocol XML. Remove these ignores when a compatible scanner ships.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195
